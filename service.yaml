apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx   # Liga com o deployment
  ports:
    - protocol: TCP
      port: 80        # Porta do serviço
      targetPort: 80  # Porta do container
  type: ClusterIP
  resources:
    limits:
      cpu: "200m"
      memory: "128Mi"
